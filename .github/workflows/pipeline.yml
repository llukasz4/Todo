name: Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t task-manager .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t task-manager .

      - name: Run container
        run: docker run -d -p 5000:5000 --name task-manager task-manager

      - name: Wait for app to start
        run: sleep 3

      - name: Test health endpoint
        run: curl --fail http://localhost:5000/health

      - name: Test GET tasks
        run: curl --fail http://localhost:5000/tasks

      - name: Test POST task
        run: |
          curl --fail -X POST http://localhost:5000/tasks \
          -H "Content-Type: application/json" \
          -d '{"title": "Test task"}'

      - name: Stop container
        run: docker stop task-manager